<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Game Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Dual Game Tracker</h1>
    <p>Local-only progress tracker</p>
  </header>

  <main>
    <!-- Controls section for game selection, search, and data management -->
    <section class="controls">
      <label for="gameSelect">Choose tracker:</label>
      <!-- Dropdown to select which game's data to load -->
      <select id="gameSelect">
        <option value="MSM">MSM</option>
        <option value="Pocket">Pocket</option>
      </select>

      <input type="text" id="searchInput" placeholder="Search..." />

      <button id="exportBtn">Export Save</button>
      <button id="importBtn">Import Save</button>
      <button id="resetBtn">Reset Current Game Save</button>
      <input type="file" id="importFile" accept=".json" hidden />
    </section>

    <!-- Section to display summary statistics (total, collected, favorites) -->
    <section id="summary" class="summary"></section>
    
    <!-- Container for the list of entities (cards) -->
    <section id="entityList" class="entity-list"></section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
